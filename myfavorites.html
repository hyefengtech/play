<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>최애구절판 생성기</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

:root{
    --primary:#6366f1;
    --primary2:#8b5cf6;
    --bg:#f8fafc;
    --card:rgba(255,255,255,.78);
    --border:#e2e8f0;
    --text:#1e293b;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Pretendard",sans-serif;
    color:var(--text);

    background:
        radial-gradient(circle at top,#eef2ff 0%,#f8fafc 45%,#ffffff 100%);

    min-height:100vh;
    padding:40px;
}

/* ===== 상단 패널 ===== */

.top{

    max-width:1200px;
    margin:auto;
    margin-bottom:28px;

    padding:28px;

    border-radius:28px;

    background:var(--card);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.7);

    box-shadow:
    0 20px 50px rgba(15,23,42,.08);
}

/* ===== 입력창 ===== */

input,
textarea{

    width:100%;

    padding:15px 18px;

    margin-top:10px;

    border-radius:18px;

    border:1px solid var(--border);

    background:#fff;

    font-size:16px;

    transition:.25s;

    font-family:inherit;

}

textarea{

    resize:vertical;
    min-height:110px;

}

input:focus,
textarea:focus{

    outline:none;

    border-color:var(--primary);

    box-shadow:
    0 0 0 4px rgba(99,102,241,.18);

}

/* ===== 컨트롤 ===== */

.controls{

    display:flex;

    align-items:center;

    gap:18px;

    margin-top:18px;

    flex-wrap:wrap;

}

.controls label{

    display:flex;

    align-items:center;

    gap:12px;

    font-weight:600;

}

/* ===== 버튼 ===== */

button{

    border:none;

    border-radius:18px;

    padding:14px 28px;

    background:
    linear-gradient(135deg,
    var(--primary),
    var(--primary2));

    color:white;

    font-size:15px;

    font-weight:700;

    cursor:pointer;

    transition:.25s;

}

button:hover{

    transform:translateY(-2px);

    box-shadow:

    0 16px 32px rgba(99,102,241,.28);

}

button:active{

    transform:scale(.97);

}

/* ===== 슬라이더 ===== */

input[type=range]{

    width:220px;

    accent-color:var(--primary);

    cursor:pointer;

}

/* ===== 보드 ===== */

#board{

    max-width:1200px;

    margin:auto;

    padding:34px;

    border-radius:34px;

    background:rgba(255,255,255,.86);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.8);

    box-shadow:

    0 30px 70px rgba(15,23,42,.09);

}

/* ===== 제목 ===== */

#nickView{

    text-align:center;

    font-size:34px;

    font-weight:800;

    margin-bottom:6px;

}

#xView{

    text-align:center;

    color:#64748b;

    font-size:18px;

    margin-bottom:26px;

}

/* ===== SVG ===== */

svg{

    width:100%;

    display:block;

    border-radius:24px;

}

/* ===== 선택 ===== */

.region{

    cursor:pointer;

    transition:.25s;

}

.region:hover{

    stroke:#818cf8;

    stroke-width:3;

}

.selected{

    stroke:#6366f1 !important;

    stroke-width:5 !important;

    filter:drop-shadow(0 0 10px rgba(99,102,241,.45));

}

/* ===== 구절 ===== */

#quoteView{

    margin-top:26px;

    padding:24px;

    border-radius:24px;

    background:#f8fafc;

    font-size:24px;

    line-height:1.8;

    font-weight:600;

    text-align:center;

    border:1px solid #e2e8f0;

}

/* ===== 스크롤 ===== */

::-webkit-scrollbar{

    width:10px;

}

::-webkit-scrollbar-thumb{

    background:#cbd5e1;

    border-radius:99px;

}

/* ===== 모바일 ===== */

@media(max-width:768px){

body{

padding:16px;

}

.top{

padding:20px;

border-radius:22px;

}

#board{

padding:18px;

border-radius:22px;

}

.controls{

flex-direction:column;

align-items:flex-start;

}

button{

width:100%;

}

input[type=range]{

width:100%;

}

#nickView{

font-size:28px;

}

#quoteView{

font-size:18px;

}

}</style>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>
<div class="top">
<input id="nick" placeholder="닉네임">
<input id="xid" placeholder="@아이디">
<textarea id="quote" placeholder="최애 구절판"></textarea>
<div class="controls">
<button id="saveBtn">PNG 저장</button>
<label>확대 <input id="zoom" type="range" min="50" max="400" value="100"></label>
</div>
</div>

<div id="board">
<h2 id="nickView">닉네임</h2>
<div id="xView">@아이디</div>
<svg id="svg" viewBox="0 0 1000 1000">
<defs id="defs"></defs>
<g id="layers"></g>
</svg>
<div id="quoteView" style="text-align:center;font-size:24px">최애 구절판</div>
</div>

<input type="file" id="picker" hidden accept="image/*">

<script>
const cx=500, cy=500, r=180, R=520;

function oct(rad){
  const p=[];
  for(let i=0;i<8;i++){
    const a=(-22.5+i*45)*Math.PI/180;
    p.push([cx+rad*Math.cos(a), cy+rad*Math.sin(a)]);
  }
  return p;
}
function pts(a){return a.map(v=>v.join(",")).join(" ");}

const inner=oct(r);
const defs=document.getElementById("defs");
const layers=document.getElementById("layers");

const regions=[inner];
for(let i=0;i<8;i++){
  const a=inner[i];
  const b=inner[(i+1)%8];
  const oa=[cx+R*Math.cos((-22.5+i*45)*Math.PI/180),cy+R*Math.sin((-22.5+i*45)*Math.PI/180)];
  const ob=[cx+R*Math.cos((-22.5+(i+1)*45)*Math.PI/180),cy+R*Math.sin((-22.5+(i+1)*45)*Math.PI/180)];
  regions.push([a,b,ob,oa]);
}

const state={};
let active=0;

regions.forEach((poly,i)=>{
  state[i]={x:0,y:0,s:1,src:"",ratio:1,w:1000,h:1000};
  defs.insertAdjacentHTML("beforeend",
   `<clipPath id="cp${i}"><polygon points="${pts(poly)}"/></clipPath>`);
  layers.insertAdjacentHTML("beforeend",
   `<image id="img${i}" clip-path="url(#cp${i})"></image>
    <polygon id="poly${i}" class="region" data-id="${i}" points="${pts(poly)}"
    fill="transparent" stroke="black"/>`);
});

function render(i){
  const st=state[i];
  const img=document.getElementById("img"+i);

  let w,h;

  if(st.ratio >= 1){
    w = 1000 * st.s;
    h = w / st.ratio;
  }else{
    h = 1000 * st.s;
    w = h * st.ratio;
  }

  st.w=w; st.h=h;

  img.setAttribute("href",st.src);
  img.setAttribute("x",st.x);
  img.setAttribute("y",st.y);
  img.setAttribute("width",w);
  img.setAttribute("height",h);
  img.setAttribute("preserveAspectRatio","none");
}

function select(id){
  active=id;
  document.querySelectorAll(".region").forEach(x=>x.classList.remove("selected"));
  document.getElementById("poly"+id).classList.add("selected");
  zoom.value=Math.round(state[id].s*100);
}
select(0);

document.querySelectorAll(".region").forEach(el=>{
  el.addEventListener("click",()=>{
    select(+el.dataset.id);
    picker.click();
  });
});

picker.onchange=e=>{
  const f=e.target.files[0];
  if(!f) return;

  const fr=new FileReader();
  fr.onload=v=>{
    const test=new Image();

    test.onload=()=>{
      state[active].ratio=test.width/test.height;
      state[active].src=v.target.result;

      if(state[active].ratio>=1){
        state[active].x=-250;
        state[active].y=0;
      }else{
        state[active].x=0;
        state[active].y=-250;
      }

      render(active);
    };

    test.src=v.target.result;
  };
  fr.readAsDataURL(f);
};

zoom.oninput=e=>{
  state[active].s=e.target.value/100;
  render(active);
};

let drag=false,sx=0,sy=0;

svg.addEventListener("mousedown",e=>{
  drag=true;
  sx=e.clientX;
  sy=e.clientY;
});

document.addEventListener("mouseup",()=>drag=false);

document.addEventListener("mousemove",e=>{
  if(!drag) return;

  state[active].x += (e.clientX-sx);
  state[active].y += (e.clientY-sy);

  sx=e.clientX;
  sy=e.clientY;

  render(active);
});

nick.oninput=()=>nickView.textContent=nick.value||"닉네임";
xid.oninput=()=>xView.textContent=xid.value||"@아이디";
quote.oninput=()=>quoteView.textContent=quote.value||"최애 구절판";

saveBtn.onclick=async()=>{
  const c=await html2canvas(document.getElementById("board"),{scale:4});
  const a=document.createElement("a");
  a.href=c.toDataURL("image/png");
  a.download="favorite-board.png";
  a.click();
};
</script>
</body>
</html>
