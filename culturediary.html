<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Culture Life's playlist</title>
<style>
/* ===========================
   Google Font
=========================== */
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');

:root{
    --primary:#6C63FF;
    --primary-light:#8E88FF;
    --bg:#F6F7FB;
    --white:#fff;
    --text:#222;
    --gray:#8b8b8b;
    --border:#ECECEC;
    --shadow:0 20px 45px rgba(0,0,0,.08);
    --radius:22px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Pretendard","Noto Sans KR",sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:40px;
}

h1{
    text-align:center;
    font-size:3rem;
    font-weight:800;
    margin-bottom:12px;
    color:#222;
}

body::before{

content:"오늘의 문화생활을 기록해보세요.";

display:block;

text-align:center;

color:#777;

margin-bottom:40px;

font-size:18px;

}

/* ===========================
Header
=========================== */

.calendar-header{

background:white;

padding:20px 30px;

border-radius:20px;

box-shadow:var(--shadow);

margin-bottom:30px;

display:flex;

justify-content:space-between;

align-items:center;

}

.month-year-text{

font-size:26px;

font-weight:700;

}

.calendar-header button{

background:linear-gradient(
135deg,
var(--primary),
var(--primary-light)
);

width:52px;

height:52px;

border-radius:16px;

font-size:20px;

transition:.25s;

}

.calendar-header button:hover{

transform:translateY(-4px);

box-shadow:0 12px 20px rgba(108,99,255,.3);

}

/* ===========================
Calendar
=========================== */

#calendar{

display:grid;

grid-template-columns:repeat(7,1fr);

gap:18px;

margin-bottom:50px;

}

.day-of-week{

font-weight:700;

text-align:center;

color:#777;

padding-bottom:10px;

}

.empty-day{

height:130px;

}

.day-container{

height:130px;

border-radius:22px;

overflow:hidden;

background:white;

border:1px solid var(--border);

box-shadow:var(--shadow);

transition:.3s;

cursor:pointer;

position:relative;

}

.day-container:hover{

transform:translateY(-6px);

}

.day{

height:100%;

display:flex;

align-items:flex-start;

justify-content:flex-end;

padding:16px;

font-size:18px;

font-weight:700;

color:#fff;

background:rgba(255,255,255,.15);

backdrop-filter:blur(3px);

}

.day-container:not(.has-image) .day{

color:#222;

}

.selected-day{

outline:4px solid var(--primary);

}

  /* ===========================
Diary Form
=========================== */

.diary-form{

display:none;

max-width:760px;

margin:0 auto 40px;

padding:35px;

background:rgba(255,255,255,.92);

backdrop-filter:blur(15px);

border-radius:28px;

box-shadow:0 20px 50px rgba(0,0,0,.08);

border:1px solid rgba(255,255,255,.4);

animation:fade .35s;

}

.diary-form h2{

font-size:30px;

margin-bottom:28px;

}

.form-group{

margin-bottom:22px;

}

label{

display:block;

margin-bottom:10px;

font-weight:700;

color:#555;

}

input,
textarea{

width:100%;

padding:16px 18px;

font-size:16px;

border-radius:16px;

border:1px solid #E5E5E5;

background:#FAFAFC;

transition:.25s;

font-family:inherit;

}

input:focus,
textarea:focus{

outline:none;

border-color:var(--primary);

box-shadow:0 0 0 5px rgba(108,99,255,.12);

background:white;

}

textarea{

resize:vertical;

min-height:160px;

}

button{

padding:14px 24px;

border:none;

border-radius:16px;

font-size:16px;

font-weight:700;

cursor:pointer;

transition:.25s;

background:linear-gradient(
135deg,
var(--primary),
#8b85ff
);

color:white;

margin-right:10px;

}

button:hover{

transform:translateY(-3px);

box-shadow:0 14px 25px rgba(108,99,255,.25);

}

button.cancel{

background:#E5E7EB;

color:#555;

}

/* ===========================
Entry
=========================== */

#entries{

max-width:1000px;

margin:auto;

display:grid;

grid-template-columns:repeat(auto-fill,minmax(420px,1fr));

gap:26px;

}

.entry{

background:white;

border-radius:24px;

overflow:hidden;

box-shadow:0 20px 40px rgba(0,0,0,.08);

transition:.3s;

border:1px solid var(--border);

}

.entry:hover{

transform:translateY(-8px);

}

.entry img{

width:100%;

height:250px;

object-fit:cover;

display:block;

}

.entry h3{

padding:24px 24px 10px;

font-size:24px;

}

.entry p{

padding:0 24px 24px;

line-height:1.8;

color:#555;

}

.entry button{

margin:0 0 24px 24px;

}

.entry::before{

content:"🎬";

position:absolute;

display:none;

}

/* ===========================
Animation
=========================== */

@keyframes fade{

from{

opacity:0;

transform:translateY(25px);

}

to{

opacity:1;

transform:translateY(0);

}

}

.entry{

animation:fade .35s;

}

  /* ===========================
Calendar Image Style
=========================== */

.day-container.has-image{

background-size:cover;

background-position:center;

position:relative;

overflow:hidden;

}

.day-container.has-image::before{

content:"";

position:absolute;

inset:0;

background:linear-gradient(
180deg,
rgba(0,0,0,.05),
rgba(0,0,0,.45)
);

}

.day-container.has-image .day{

position:relative;

z-index:2;

color:white;

}

.day-container.has-diary::after{

content:"●";

position:absolute;

left:14px;

bottom:12px;

width:10px;

height:10px;

font-size:12px;

color:white;

z-index:3;

}

/* ===========================
Card Hover
=========================== */

.day-container{

transition:
transform .25s,
box-shadow .25s,
border .25s;

}

.day-container:hover{

transform:translateY(-8px) scale(1.02);

box-shadow:
0 18px 40px rgba(0,0,0,.18);

border-color:transparent;

}

/* ===========================
Scrollbar
=========================== */

::-webkit-scrollbar{

width:10px;

}

::-webkit-scrollbar-track{

background:#eee;

border-radius:30px;

}

::-webkit-scrollbar-thumb{

background:#bbb;

border-radius:30px;

}

::-webkit-scrollbar-thumb:hover{

background:var(--primary);

}

/* ===========================
Entry Buttons
=========================== */

.entry button{

margin-top:6px;

}

.entry button:last-child{

background:#ff5f6d;

}

/* ===========================
Image Animation
=========================== */

.entry img{

transition:.45s;

}

.entry:hover img{

transform:scale(1.05);

}

/* ===========================
Selected Card
=========================== */

.selected-day{

transform:scale(1.05);

box-shadow:
0 18px 45px rgba(108,99,255,.35);

}

/* ===========================
Responsive
=========================== */

@media (max-width:1024px){

body{

padding:24px;

}

#entries{

grid-template-columns:1fr;

}

.day-container{

height:110px;

}

}

@media (max-width:768px){

h1{

font-size:2rem;

}

.calendar-header{

padding:16px;

}

.month-year-text{

font-size:22px;

}

#calendar{

gap:10px;

}

.day-container{

height:88px;

border-radius:16px;

}

.day{

padding:10px;

font-size:15px;

}

.diary-form{

padding:24px;

}

.entry img{

height:200px;

}

}

@media (max-width:480px){

body{

padding:16px;

}

#calendar{

grid-template-columns:repeat(7,1fr);

gap:6px;

}

.day-container{

height:70px;

}

.day{

font-size:13px;

padding:8px;

}

.entry h3{

font-size:20px;

}

.entry p{

font-size:15px;

}

button{

width:100%;

margin:8px 0;

}

}


.hero-card{

display:flex;

justify-content:space-between;

align-items:center;

padding:40px;

margin-bottom:40px;

background:linear-gradient(135deg,#6C63FF,#8C82FF);

border-radius:28px;

color:white;

box-shadow:0 25px 55px rgba(108,99,255,.25);

}

.hero-left h1{

color:white;

margin:0;

}

.hero-left p{

margin-top:12px;

font-size:18px;

opacity:.9;

}

.hero-right{

width:220px;

}

.hero-info{

background:rgba(255,255,255,.15);

backdrop-filter:blur(12px);

padding:22px;

border-radius:20px;

text-align:center;

}

.hero-info span{

font-size:40px;

display:block;

margin-bottom:10px;

}

</style>
  
</head>
<body>
<div class="hero-card">

    <div class="hero-left">

        <h1>🎵 My Culture Playlist</h1>

        <p>
            오늘의 문화생활을 기록해보세요.
        </p>

    </div>

    <div class="hero-right">

        <div class="hero-info">

            <span>🎬</span>

            <h3>이번 달 목표</h3>

            <p>문화생활 5개 기록하기</p>

        </div>

    </div>

</div>
    <div id="diary-form" class="diary-form">
      <h2>✨ 새로운 문화 기록</h2>
      <div class="form-group">
        <label for="event">이벤트 [종류]이름 </label>
        <input type="text" id="event" placeholder="예: 영화, 전시회, 뮤지컬, 책, 연극 등">
      </div>
      <div class="form-group">
        <label for="image-url">이미지 URL</label>
        <input type="text" id="image-url" placeholder="이미지 URL 입력">
      </div>
      <div class="form-group">
        <label for="review">후기</label>
        <textarea id="review" rows="4" placeholder="간단한 후기를 입력하세요"></textarea>
      </div>
      <button onclick="saveEntry()">저장</button>
      <button class="cancel" onclick="cancelEntry()">취소</button>
    </div>


  <div class="calendar-wrapper">

    <div class="calendar-header">
        <button onclick="changeMonth(-1)">&#60;</button>

        <h2 id="month-year" class="month-year-text"></h2>

        <button onclick="changeMonth(1)">&#62;</button>
    </div>

    <div id="calendar"></div>

</div>

  
    <div id="calendar"></div>

  <div class="entries-wrapper">

    <h2 class="section-title">
        ✨ 나의 문화 기록
    </h2>

    <div id="entries"></div>

</div>

  <script>
    let selectedDay = null;
    let year = new Date().getFullYear();
    let month = new Date().getMonth();

    function saveEntry() {
        const event = document.getElementById('event').value;
        const imageUrl = document.getElementById('image-url').value;
        const review = document.getElementById('review').value;
      
        if (event && imageUrl && review) {
          const entry = { event, imageUrl, review };
          const selectedDate = selectedDateString();
          const entries = getEntriesForDate(selectedDate);
          entries.push(entry);
          setEntriesForDate(selectedDate, entries);
      
          // 새로운 다이어리를 저장한 후에 날짜 버튼의 배경 이미지 업데이트
          updateDayButtonImage(selectedDate, imageUrl);
      
          displayEntries();
          cancelEntry(); // 다이어리 작성 폼 닫기
        } else {
          alert('이벤트, 이미지 URL, 후기를 모두 입력하세요.');
        }
      }

      function updateDayButtonImage(selectedDate, imageUrl) {
        const day = parseInt(selectedDate.split('-')[2]);
        const dayContainer = document.querySelector(`.day-container[data-day="${day}"]`);
      
        if (dayContainer) {
          if (imageUrl) {
            dayContainer.style.backgroundImage = `url('${imageUrl}')`;
            dayContainer.classList.add('has-image');
          } else {
            dayContainer.style.backgroundImage = 'none';
            dayContainer.classList.remove('has-image');
          }
        }
      }

    function cancelEntry() {
      hideDiaryForm();
    }

    function showDiaryForm() {
      const diaryForm = document.getElementById('diary-form');
      diaryForm.style.display = 'block';
    }

    function hideDiaryForm() {
      const diaryForm = document.getElementById('diary-form');
      diaryForm.style.display = 'none';
    }

    function handleDayClick(day) {
      selectedDay = day;
      displayEntries();
      showDiaryForm();

      // 선택된 날짜에 대한 스타일을 변경
      const days = document.querySelectorAll('.day-container');
      days.forEach((dayElement) => {
        dayElement.classList.remove('selected-day');
      });

      const selectedDayElement = document.querySelector(`.day-container[data-day="${day}"]`);
      selectedDayElement.classList.add('selected-day');
    }

    function displayEntries() {
      const entriesContainer = document.getElementById('entries');
      entriesContainer.innerHTML = '';

      const selectedDate = selectedDateString();
      const entries = getEntriesForDate(selectedDate) || [];

      entries.forEach((entry, index) => {
        const entryDiv = createEntryElement(entry, index);
        entriesContainer.appendChild(entryDiv);
      });
    }

    function createEntryElement(entry, index) {
      const entryDiv = document.createElement('div');
      entryDiv.classList.add('entry');

      const image = document.createElement('img');
      image.src = entry.imageUrl;
      image.alt = entry.event;
      image.style.maxWidth = '100%';

      const eventHeading = document.createElement('h3');
      eventHeading.textContent = entry.event;

      const reviewParagraph = document.createElement('p');
      reviewParagraph.textContent = entry.review;

      const editButton = document.createElement('button');
      editButton.textContent = '수정';
      editButton.onclick = () => editEntry(index);

      const deleteButton = document.createElement('button');
      deleteButton.textContent = '삭제';
      deleteButton.onclick = () => deleteEntry(index);

      entryDiv.appendChild(image);
      entryDiv.appendChild(eventHeading);
      entryDiv.appendChild(reviewParagraph);
      entryDiv.appendChild(editButton);
      entryDiv.appendChild(deleteButton);

      return entryDiv;
    }

    function editEntry(index) {
      const selectedDate = selectedDateString();
      const entries = getEntriesForDate(selectedDate) || [];
      const entryToEdit = entries[index];

      if (entryToEdit) {
        document.getElementById('event').value = entryToEdit.event;
        document.getElementById('image-url').value = entryToEdit.imageUrl;
        document.getElementById('review').value = entryToEdit.review;

        entries.splice(index, 1);
        setEntriesForDate(selectedDate, entries);
        displayEntries();
        showDiaryForm(); // 수정할 때 다이어리 폼 열기
      }
    }

function deleteEntry(index) {
    const selectedDate = selectedDateString();
    const entries = getEntriesForDate(selectedDate) || [];
  
    if (entries[index]) {
      entries.splice(index, 1);
      setEntriesForDate(selectedDate, entries);
  
      // 다이어리를 삭제한 후에 날짜 버튼의 배경 이미지와 클래스 제거
      updateDayButtonImage(selectedDate, null);
  
      displayEntries();
    }
  }
  
  function updateDayButtonImage(selectedDate, imageUrl) {
    const day = parseInt(selectedDate.split('-')[2]);
    const dayContainer = document.querySelector(`.day-container[data-day="${day}"]`);
  
    if (dayContainer) {
      if (imageUrl) {
        dayContainer.style.backgroundImage = `url('${imageUrl}')`;
        dayContainer.classList.add('has-image');
      } else {
        dayContainer.style.backgroundImage = 'none';
        dayContainer.classList.remove('has-image');
      }
    }
  }


    function getEntriesForDate(date) {
      const storedEntries = JSON.parse(localStorage.getItem('cultureDiaryEntries')) || {};
      return storedEntries[date] || [];
    }

    function setEntriesForDate(date, entries) {
      const storedEntries = JSON.parse(localStorage.getItem('cultureDiaryEntries')) || {};
      storedEntries[date] = entries;
      localStorage.setItem('cultureDiaryEntries', JSON.stringify(storedEntries));
    }

    function selectedDateString() {
      return `${year}-${padZero(month + 1)}-${padZero(selectedDay)}`;
    }

    function padZero(number) {
      return number.toString().padStart(2, '0');
    }

    function createCalendar() {
      const calendarContainer = document.getElementById('calendar');
      const daysOfWeek = ['일', '월', '화', '수', '목', '금', '토'];

      daysOfWeek.forEach(dayOfWeek => {
        const dayElement = document.createElement('div');
        dayElement.classList.add('day-of-week');
        dayElement.textContent = dayOfWeek;
        calendarContainer.appendChild(dayElement);
      });

      createDaysOfMonth();
      updateMonthYearText();
    }


    function createDaysOfMonth() {
        const calendarContainer = document.getElementById('calendar');
        const firstDayOfMonth = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
  
        for (let i = 0; i < firstDayOfMonth; i++) {
          const emptyDayElement = document.createElement('div');
          emptyDayElement.classList.add('empty-day');
          calendarContainer.appendChild(emptyDayElement);
        }
  
        for (let i = 1; i <= daysInMonth; i++) {
          const dayContainer = document.createElement('div');
          dayContainer.classList.add('day-container');
          dayContainer.setAttribute('data-day', i);
  
          const dayElement = document.createElement('div');
          dayElement.classList.add('day');
          dayElement.textContent = i;
          dayElement.addEventListener('click', () => handleDayClick(i));
  
          const dateEntries = getEntriesForDate(`${year}-${padZero(month + 1)}-${padZero(i)}`);
          if (dateEntries.length > 0 && dateEntries[0].imageUrl) {
            dayContainer.classList.add('has-image');
            dayContainer.style.backgroundImage = `url('${dateEntries[0].imageUrl}')`;
          }
  
          // 새로운 코드: 다이어리가 저장되어 있는 날짜에 표시
          if (dateEntries.length > 0) {
            dayContainer.classList.add('has-diary');
          }
  
          dayContainer.appendChild(dayElement);
          calendarContainer.appendChild(dayContainer);
        }
      }
  
      function displayEntriesForCurrentMonth() {
        const daysInMonth = new Date(year, month + 1, 0).getDate();
  
        for (let i = 1; i <= daysInMonth; i++) {
          const selectedDate = `${year}-${padZero(month + 1)}-${padZero(i)}`;
          const entries = getEntriesForDate(selectedDate) || [];
  
          const dayButton = document.querySelector(`.day-container[data-day="${i}"]`);
          if (dayContainer && entries.length > 0) {
            const hasImage = entries.some(entry => entry.imageUrl);

            if (hasImage) {
                const imageUrl = entries[0].imageUrl;
                dayContainer.style.backgroundImage = `url(${imageUrl})`;
                dayContainer.classList.add('has-diary');
            } else {
                dayContainer.style.backgroundImage = 'none';
                dayContainer.classList.remove('has-diary'); }
  
            // 새로운 코드: 다이어리가 저장되어 있는 날짜에 표시
            if (entries.length > 0) {
              dayButton.classList.add('has-diary');
            }
          }
        }
      }
  
    function updateMonthYearText() {
      const monthYearText = document.querySelector('.month-year-text');
      monthYearText.textContent = `${year}년 ${month + 1}월`;
    }

    function changeMonth(delta) {
      month += delta;

      if (month < 0) {
        month = 11;
        year--;
      } else if (month > 11) {
        month = 0;
        year++;
      }

      clearCalendar();
      createCalendar();
      displayEntries();
    }

    function clearCalendar() {
      const calendarContainer = document.getElementById('calendar');
      calendarContainer.innerHTML = '';
    }

 
    window.onload = function() {
      createCalendar();
      displayEntries();
      displayEntriesForCurrentMonth();
    };
  </script>
</body>
</html>
